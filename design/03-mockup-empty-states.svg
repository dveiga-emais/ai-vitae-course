<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Roboto, Arial, sans-serif">
  <title>Mockup: Empty States (sin tareas y sin resultados)</title>
  <desc>Estados vacíos de la lista de tareas. Material UI: ilustración centrada, Typography, Button contained.</desc>

  <defs>
    <filter id="appbar-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- ===== ESTADO 1: Sin tareas (primera vez) ===== -->
  <text x="20" y="24" fill="#424242" font-size="14" font-weight="500">Empty State: Sin tareas (lista vacía)</text>

  <!-- Background -->
  <rect x="0" y="36" width="440" height="490" fill="#FAFAFA" rx="4"/>

  <!-- AppBar mini -->
  <rect x="0" y="36" width="440" height="48" fill="#1976D2" rx="4" filter="url(#appbar-shadow)"/>
  <rect x="0" y="60" width="440" height="24" fill="#1976D2"/>
  <text x="16" y="68" fill="#FFFFFF" font-size="15" font-weight="500">Gestor de Tareas ICE</text>

  <!-- Toolbar mini -->
  <rect x="0" y="84" width="440" height="44" fill="#FFFFFF"/>
  <rect x="12" y="94" width="110" height="28" rx="4" fill="#1976D2"/>
  <text x="67" y="113" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="500">+ NUEVA TAREA</text>
  <line x1="0" y1="128" x2="440" y2="128" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Empty state content -->
  <!-- Illustration: clipboard icon (Material style) -->
  <rect x="188" y="190" width="64" height="80" rx="6" fill="none" stroke="#BDBDBD" stroke-width="2"/>
  <rect x="198" y="182" width="44" height="16" rx="4" fill="none" stroke="#BDBDBD" stroke-width="2"/>
  <line x1="204" y1="214" x2="236" y2="214" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="204" y1="228" x2="230" y2="228" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="204" y1="242" x2="224" y2="242" stroke="#E0E0E0" stroke-width="2"/>

  <!-- Text -->
  <text x="220" y="300" text-anchor="middle" fill="#424242" font-size="18" font-weight="500">No hay tareas todavía</text>
  <text x="220" y="326" text-anchor="middle" fill="#757575" font-size="13">Crea tu primera tarea para empezar a</text>
  <text x="220" y="344" text-anchor="middle" fill="#757575" font-size="13">priorizar con el modelo ICE</text>

  <!-- CTA Button (contained primary) -->
  <rect x="110" y="370" width="220" height="42" rx="4" fill="#1976D2"/>
  <text x="220" y="396" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">CREAR TU PRIMERA TAREA</text>

  <!-- ===== ESTADO 2: Sin resultados (filtros activos) ===== -->
  <text x="470" y="24" fill="#424242" font-size="14" font-weight="500">Empty State: Sin resultados (filtros activos)</text>

  <!-- Background -->
  <rect x="460" y="36" width="440" height="490" fill="#FAFAFA" rx="4"/>

  <!-- AppBar mini -->
  <rect x="460" y="36" width="440" height="48" fill="#1976D2" rx="4" filter="url(#appbar-shadow)"/>
  <rect x="460" y="60" width="440" height="24" fill="#1976D2"/>
  <text x="476" y="68" fill="#FFFFFF" font-size="15" font-weight="500">Gestor de Tareas ICE</text>

  <!-- Toolbar mini with active filters -->
  <rect x="460" y="84" width="440" height="44" fill="#FFFFFF"/>
  <rect x="472" y="94" width="110" height="28" rx="4" fill="#1976D2"/>
  <text x="527" y="113" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="500">+ NUEVA TAREA</text>

  <!-- Active filter chips -->
  <rect x="596" y="94" width="120" height="28" rx="14" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="618" y="113" fill="#1565C0" font-size="10" font-weight="500">Estado: Done  ✕</text>

  <rect x="726" y="94" width="140" height="28" rx="14" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="748" y="113" fill="#1565C0" font-size="10" font-weight="500">Buscar: "login"  ✕</text>

  <line x1="460" y1="128" x2="900" y2="128" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Empty state content -->
  <!-- Search icon (Material style) -->
  <circle cx="680" cy="220" r="30" fill="none" stroke="#BDBDBD" stroke-width="2"/>
  <line x1="700" y1="242" x2="716" y2="258" stroke="#BDBDBD" stroke-width="2.5" stroke-linecap="round"/>
  <!-- X inside magnifier -->
  <line x1="672" y1="212" x2="688" y2="228" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="688" y1="212" x2="672" y2="228" stroke="#E0E0E0" stroke-width="2"/>

  <!-- Text -->
  <text x="680" y="300" text-anchor="middle" fill="#424242" font-size="18" font-weight="500">Sin resultados</text>
  <text x="680" y="326" text-anchor="middle" fill="#757575" font-size="13">No se encontraron tareas con</text>
  <text x="680" y="344" text-anchor="middle" fill="#757575" font-size="13">los filtros actuales.</text>

  <!-- CTA Button (outlined) -->
  <rect x="590" y="370" width="180" height="42" rx="4" fill="transparent" stroke="#1976D2" stroke-width="1"/>
  <text x="680" y="396" text-anchor="middle" fill="#1976D2" font-size="13" font-weight="500">LIMPIAR FILTROS</text>
</svg>