<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Roboto, Arial, sans-serif">
  <title>Mockup: Pantalla de Onboarding (ApiKeySetup)</title>
  <desc>Pantalla completa de configuración de API Key de Gemini. Sigue convenciones Material UI: Card elevada centrada, TextField outlined, Button contained.</desc>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAFA"/>

  <!-- Centered Card (Material elevation dp4) -->
  <rect x="200" y="60" width="400" height="480" rx="12" fill="#FFFFFF"
        filter="url(#shadow-card)"/>

  <!-- Card content -->
  <!-- App icon placeholder -->
  <circle cx="400" cy="120" r="28" fill="#1976D2"/>
  <text x="400" y="127" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="700">ICE</text>

  <!-- Title -->
  <text x="400" y="175" text-anchor="middle" fill="#212121" font-size="22" font-weight="500">Gestor de Tareas ICE</text>

  <!-- Subtitle -->
  <text x="400" y="210" text-anchor="middle" fill="#424242" font-size="16" font-weight="400">Configurar API Key de Gemini</text>

  <!-- Divider -->
  <line x1="240" y1="230" x2="560" y2="230" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Explanatory text -->
  <text x="400" y="260" text-anchor="middle" fill="#616161" font-size="13">Para usar la estimación con IA, necesitas una</text>
  <text x="400" y="278" text-anchor="middle" fill="#616161" font-size="13">API key gratuita de Google Gemini.</text>

  <!-- Link (Material text button style) -->
  <text x="400" y="310" text-anchor="middle" fill="#1976D2" font-size="13" font-weight="500" text-decoration="none" cursor="pointer">
    Obtener API key en Google AI Studio ↗
  </text>

  <!-- TextField: Outlined variant (Material UI) -->
  <rect x="240" y="340" width="320" height="56" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1.5"/>
  <!-- Floating label -->
  <rect x="250" y="333" width="60" height="14" fill="#FFFFFF"/>
  <text x="254" y="344" fill="#1976D2" font-size="12" font-weight="400">API Key</text>
  <!-- Placeholder text -->
  <text x="256" y="374" fill="#9E9E9E" font-size="14">Pega tu API key aquí</text>

  <!-- Helper text -->
  <text x="240" y="414" fill="#757575" font-size="11">La key se guardará en el almacenamiento local del navegador</text>

  <!-- Button: Contained primary (Material UI) -->
  <rect x="240" y="440" width="320" height="42" rx="4" fill="#BDBDBD"/>
  <text x="400" y="466" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="500" letter-spacing="0.5">GUARDAR Y CONTINUAR</text>

  <!-- Disabled hint -->
  <text x="400" y="500" text-anchor="middle" fill="#9E9E9E" font-size="11" font-style="italic">Botón deshabilitado mientras el campo esté vacío</text>

  <!-- Shadow filter (Material elevation dp4) -->
  <defs>
    <filter id="shadow-card" x="-4%" y="-2%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.14"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>
</svg>