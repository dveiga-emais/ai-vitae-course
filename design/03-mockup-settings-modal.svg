<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" font-family="Roboto, Arial, sans-serif">
  <title>Mockup: SettingsModal (Configuración API Key)</title>
  <desc>Modal de configuración para gestionar la API key de Gemini. Material UI: Dialog, TextField outlined, Buttons contained/text/destructive.</desc>

  <defs>
    <filter id="dialog-shadow">
      <feDropShadow dx="0" dy="11" stdDeviation="15" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Scrim -->
  <rect width="560" height="420" fill="#000000" opacity="0.5"/>

  <!-- Dialog panel -->
  <rect x="60" y="30" width="440" height="360" rx="8" fill="#FFFFFF" filter="url(#dialog-shadow)"/>

  <!-- Title bar -->
  <text x="84" y="68" fill="#212121" font-size="20" font-weight="500">Configuración</text>
  <!-- Close icon -->
  <circle cx="476" cy="58" r="18" fill="transparent"/>
  <text x="476" y="64" text-anchor="middle" fill="#757575" font-size="18">✕</text>

  <!-- Divider -->
  <line x1="60" y1="84" x2="500" y2="84" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Current API Key section -->
  <text x="84" y="116" fill="#757575" font-size="12" font-weight="500" letter-spacing="0.5">API KEY ACTUAL</text>

  <!-- Masked key display (Material Card variant outlined) -->
  <rect x="84" y="128" width="376" height="40" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="100" y="153" fill="#424242" font-size="14" font-family="Roboto Mono, monospace">AIza••••••••••••••••xF4d</text>

  <!-- New API Key TextField (outlined) -->
  <rect x="84" y="196" width="376" height="56" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="94" y="189" width="96" height="14" fill="#FFFFFF"/>
  <text x="98" y="200" fill="#757575" font-size="12" font-weight="400">Nueva API Key</text>
  <text x="100" y="230" fill="#9E9E9E" font-size="14">Pega la nueva key aquí</text>

  <!-- Helper text -->
  <text x="84" y="272" fill="#757575" font-size="11">La key se almacena únicamente en el navegador (localStorage)</text>

  <!-- Divider before actions -->
  <line x1="60" y1="296" x2="500" y2="296" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Actions row -->
  <!-- Save button (contained primary) -->
  <rect x="84" y="316" width="100" height="36" rx="4" fill="#1976D2"/>
  <text x="134" y="339" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">GUARDAR</text>

  <!-- Spacer -->

  <!-- Delete key button (outlined destructive) -->
  <rect x="340" y="316" width="120" height="36" rx="4" fill="transparent" stroke="#D32F2F" stroke-width="1"/>
  <text x="400" y="339" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="500">ELIMINAR KEY</text>

  <!-- Annotation -->
  <text x="84" y="376" fill="#9E9E9E" font-size="10" font-style="italic">"Eliminar key" abre un ConfirmModal de confirmación (variant: destructive)</text>
</svg>