<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" font-family="Roboto, Arial, sans-serif">
  <title>Mockup: TaskModal (Crear / Editar tarea)</title>
  <desc>Modal de creación y edición de tarea. Material UI: Dialog con overlay, TextFields outlined, Select, Buttons contained/text.</desc>

  <defs>
    <filter id="dialog-shadow">
      <feDropShadow dx="0" dy="11" stdDeviation="15" flood-color="#000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="24" stdDeviation="38" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Scrim / Overlay (Material dark scrim) -->
  <rect width="600" height="700" fill="#000000" opacity="0.5"/>

  <!-- Dialog panel (Material Dialog, elevation dp24) -->
  <rect x="60" y="30" width="480" height="640" rx="8" fill="#FFFFFF" filter="url(#dialog-shadow)"/>

  <!-- Dialog title bar -->
  <text x="84" y="68" fill="#212121" font-size="20" font-weight="500">Crear tarea</text>
  <!-- Close icon button -->
  <circle cx="516" cy="58" r="18" fill="transparent"/>
  <text x="516" y="64" text-anchor="middle" fill="#757575" font-size="18">✕</text>

  <!-- Divider -->
  <line x1="60" y1="84" x2="540" y2="84" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ===== Form content (Dialog content area) ===== -->

  <!-- TextField: Título (required) — Outlined -->
  <rect x="84" y="108" width="432" height="56" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="2"/>
  <rect x="94" y="101" width="52" height="14" fill="#FFFFFF"/>
  <text x="98" y="112" fill="#1976D2" font-size="12" font-weight="400">Título *</text>
  <text x="100" y="142" fill="#212121" font-size="14">Implementar login con OAuth</text>

  <!-- TextField: Descripción — Outlined, multiline -->
  <rect x="84" y="190" width="432" height="96" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="94" y="183" width="80" height="14" fill="#FFFFFF"/>
  <text x="98" y="194" fill="#757575" font-size="12" font-weight="400">Descripción</text>
  <text x="100" y="224" fill="#212121" font-size="14">Integrar OAuth 2.0 con Google para</text>
  <text x="100" y="244" fill="#212121" font-size="14">autenticación de usuarios en la app.</text>
  <!-- Helper text -->
  <text x="84" y="306" fill="#757575" font-size="11">Necesaria para que la IA pueda estimar el ICE</text>

  <!-- Select: Estado — Outlined (solo en modo edición) -->
  <rect x="84" y="326" width="200" height="56" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="94" y="319" width="48" height="14" fill="#FFFFFF"/>
  <text x="98" y="330" fill="#757575" font-size="12" font-weight="400">Estado</text>
  <text x="100" y="362" fill="#212121" font-size="14">Doing</text>
  <text x="268" y="362" fill="#757575" font-size="14">▾</text>
  <!-- Hint -->
  <text x="300" y="362" fill="#9E9E9E" font-size="11" font-style="italic">Solo en modo edición</text>

  <!-- Section divider with label (Material style) -->
  <line x1="84" y1="410" x2="160" y2="410" stroke="#E0E0E0" stroke-width="1"/>
  <text x="170" y="414" fill="#757575" font-size="12" font-weight="500">Puntuación ICE (opcional)</text>
  <line x1="380" y1="410" x2="516" y2="410" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ICE inputs row 1: Impact + Confidence -->
  <!-- Impact -->
  <rect x="84" y="436" width="200" height="56" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="94" y="429" width="48" height="14" fill="#FFFFFF"/>
  <text x="98" y="440" fill="#757575" font-size="12" font-weight="400">Impact</text>
  <text x="100" y="472" fill="#212121" font-size="14">85</text>

  <!-- Confidence -->
  <rect x="316" y="436" width="200" height="56" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="326" y="429" width="76" height="14" fill="#FFFFFF"/>
  <text x="330" y="440" fill="#757575" font-size="12" font-weight="400">Confidence</text>
  <text x="332" y="472" fill="#212121" font-size="14">60</text>

  <!-- ICE inputs row 2: Ease -->
  <rect x="84" y="516" width="200" height="56" rx="4" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
  <rect x="94" y="509" width="34" height="14" fill="#FFFFFF"/>
  <text x="98" y="520" fill="#757575" font-size="12" font-weight="400">Ease</text>
  <text x="100" y="552" fill="#212121" font-size="14">70</text>

  <!-- Helper text for ICE -->
  <text x="84" y="594" fill="#757575" font-size="11">Enteros de 0 a 100. Dejar vacío si no se quiere definir.</text>

  <!-- Divider before actions -->
  <line x1="60" y1="616" x2="540" y2="616" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Dialog actions (Material Dialog actions: right-aligned) -->
  <!-- Cancel: Text button -->
  <text x="362" y="650" fill="#757575" font-size="14" font-weight="500" cursor="pointer">CANCELAR</text>

  <!-- Save: Contained button -->
  <rect x="432" y="630" width="90" height="36" rx="4" fill="#1976D2"/>
  <text x="477" y="653" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">GUARDAR</text>
</svg>